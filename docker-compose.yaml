name: koogo

services:
  postgres:
    container_name: koogo-postgres
    image: postgres:17
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: koogo
    ports:
      - 5432:5432
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./scripts/init_postgres.sh:/docker-entrypoint-initdb.d/init_postgres.sh:ro
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "postgres", "-d", "koogo"]
      interval: 10s
      timeout: 5s
      retries: 5

  otel-collector:
    container_name: koogo-otel-collector
    image: otel/opentelemetry-collector-contrib:0.123.0
    volumes:
      - ./deployment/otel-collector-config.yaml:/etc/otelcol-contrib/config.yaml
    environment:
      GRAFANA_CLOUD_OTLP_ENDPOINT: ${GRAFANA_CLOUD_OTLP_ENDPOINT}
      GRAFANA_CLOUD_INSTANCE_ID: ${GRAFANA_CLOUD_INSTANCE_ID}
      GRAFANA_CLOUD_API_KEY: ${GRAFANA_CLOUD_API_KEY}
    ports:
      - 1888:1888 # pprof extension
      - 8888:8888 # Prometheus metrics exposed by the Collector
      - 8889:8889 # Prometheus exporter metrics
      - 13133:13133 # health_check extension
      - 4317:4317 # OTLP gRPC receiver
      - 4318:4318 # OTLP http receiver
      - 55679:55679 # zpages extension

volumes:
  pgdata:
    driver: local
